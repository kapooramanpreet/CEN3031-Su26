<!DOCTYPE html>
<html>
<head>
  <title>Users CRUD</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>Users Application</h1>
  <p>Welcome to the Users Application!</p>
  <p>Use the form below to add new users, and the search users by their course.</p>
  <h2>Add User</h2>

  <!-- Create a user -->
  <form id="add-form">
    <input id="name" placeholder="Name" required />
    <input id="course" placeholder="Course" required />
    <button>Add user</button>
  </form>

  <h2>Search Users</h2>

  <!-- Search by course -->
  <form id="search-form">
    <input id="search" placeholder="Filter by course" />
    <button>Search</button>
    <button type="button" id="show_all">Show all</button>
  </form>

  <ul id="list"></ul>

  <script src="app.js"></script>
</body>
</html>
